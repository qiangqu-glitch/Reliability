 drawGrid(c,PAD,minY,maxY,v=>v>=1000?(v/1000).toFixed(1)+'k':v.toFixed(1));

 series.forEach(s=>{x.strokeStyle=s.col;x.lineWidth=s.bold?2.2:1.2;

 first?x.moveTo(tX(d[xKey]),tY(v)):x.lineTo(tX(d[xKey]),tY(v));first=false;});
 x.stroke();x.setLineDash([]);});
 
 x.textAlign='left';let lx=PAD.l+6,ly=PAD.t+13;
 series.forEach(s=>{x.fillStyle=s.col;x.fillRect(lx,ly-6,12,2.5);
 x.fillStyle='#94a3b8';x.font='9px sans-serif';x.fillText(s.lbl,lx+15,ly);
 lx+=Math.max(90,x.measureText(s.lbl).width+20);if(lx>W-60){lx=PAD.l+6;ly+=12;}});}

function drawHist(id,vals,bins=22){
 const c=ctx(id);if(!c)return;const{ctx:x,W,H}=c;
 x.clearRect(0,0,W,H);const PAD={l:10,r:10,t:16,b:24};
 const iW=W-PAD.l-PAD.r,iH=H-PAD.t-PAD.b;
 const mn=Math.min(...vals),mx=Math.max(...vals),bw=(mx-mn)/bins||.1;
 const counts=new Array(bins).fill(0);
 vals.forEach(v=>{const b=Math.min(bins-1,Math.floor((v-mn)/bw));counts[b]++;});
 const maxC=Math.max(...counts),bpx=iW/bins;
 counts.forEach((c,i)=>{const bh=iH*c/maxC,bx=PAD.l+i*bpx;
 const midV=mn+i*bw+bw/2;const col=midV>=95?'#10b981':midV>=85?'#f59e0b':'#ef4444';
 x.fillStyle=col+'88';x.fillRect(bx,PAD.t+iH-bh,bpx-1,bh);
 x.strokeStyle=col;x.lineWidth=.5;x.strokeRect(bx,PAD.t+iH-bh,bpx-1,bh);});
 const mV=(mn+mx)/2,mx2=PAD.l+iW*(mV-mn)/(mx-mn||1);
 x.strokeStyle='#0d9488';x.lineWidth=1.5;x.setLineDash([4,3]);
 x.beginPath();x.moveTo(mx2,PAD.t);x.lineTo(mx2,PAD.t+iH);x.stroke();x.setLineDash([]);
 x.fillStyle='#0d9488';x.font='8px monospace';x.textAlign='center';
 x.fillText('μ='+mV.toFixed(1)+'%',mx2,PAD.t-1);
 x.fillStyle='#64748b';x.font='9px monospace';x.textAlign='center';
 [0,.25,.5,.75,1].forEach(v=>{x.fillText((mn+v*(mx-mn)).toFixed(1)+'%',PAD.l+v*iW,H-6);});}

<script>

let AM = {
 rawData: '120\n350\n580\n920\n1350\n1890\n2500\n3250\n4100\n5100',
 terminated: 'time', 
 T: 6000, 
 res: null,
};

const AM_EXAMPLES = {
 dev: {
 name: '设备开发测试 Equipment Development',
 data: '120\n350\n580\n920\n1350\n1890\n2500\n3250\n4100\n5100',
 T: 6000, term: 'time'
 },
 field: {
 name: '现场运行数据 Field Operation',
 data: '200\n600\n1100\n1800\n2700\n3800\n5200\n6900\n8800\n11000',
 T: 12000, term: 'time'
 },
};

function fitAMSAA(failures, T, terminated) {
 const n = failures.length;
 if (n < 2) return null;
 failures = [...failures].sort((a,b)=>a-b);

 const sumLnT = failures.reduce((s,t) => s + Math.log(t), 0);
 const lnT = terminated === 'time' ? Math.log(T) : Math.log(failures[n-1]);
 
 const denom = n * lnT - sumLnT;
 if(Math.abs(denom) < 1e-12) return null; // guard: all failures at same time → β undefined
 const beta = n / denom;
 if(!isFinite(beta) || beta <= 0) return null;
 const lambda = (terminated === 'time') ? n / Math.pow(T, beta) : (n-1) / Math.pow(failures[n-1], beta);
 if(!isFinite(lambda) || lambda <= 0) return null;

 const Cvm = failures.reduce((s,t,i) => {
 const Fi = 1 - Math.exp(-lambda * Math.pow(t, beta)); 
 const Ui = (lambda * Math.pow(t, beta)) / (lambda * Math.pow(T, beta));
 return s + Math.pow(Ui - (2*(i+1)-1)/(2*n), 2);
 }, 0) + 1/(12*n);

 const rhoT = lambda * beta * Math.pow(T, beta - 1);
 const mtbfT = 1 / rhoT;

 const t1 = failures[0];
 const rho1 = lambda * beta * Math.pow(t1, beta - 1);
 const mtbf1 = 1 / rho1;

 const trend = beta < 0.9 ? 'improving' : beta > 1.1 ? 'degrading' : 'random';
 
 return { beta, lambda, n, T: terminated==='time'?T:failures[n-1], failures,
 mtbfT, mtbf1, Cvm, trend };
}

function runAMSAA() {
 const nums = AM.rawData.trim().split(/[\n,\s]+/).map(Number).filter(v=>!isNaN(v)&&v>0);
 if (nums.length < 3) { alert(LANG==='zh'?'至少需要3个失效时间':'Need 3+ failure times'); return; }
 AM.res = fitAMSAA(nums, AM.T, AM.terminated);
 if(!AM.res){ alert(LANG==='zh'?'拟合失败：数据可能全部相同或数值异常':'Fit failed: data may be identical or numerically degenerate'); return; }
 renderAMSAA();
}

 </div>
 <button class="btn btp btf" style="margin-top:10px" onclick="runAMSAA()">▶ ${z?'拟合 Crow-AMSAA 模型':'Fit Crow-AMSAA Model'}</button>

 :r.trend==='degrading'?'Failure rate rising. Immediate RCA and PM recommended.'

function doAMQuery() {
 const r = AM.res; if (!r) return;
 const t = parseFloat(document.getElementById('amQT')?.value);
 if (isNaN(t) || t <= 0) return;
 const rho = r.lambda * r.beta * Math.pow(t, r.beta - 1);
 const mtbf = 1 / rho;
 const el = document.getElementById('amQR');
 if (el) el.innerHTML = `t=${t.toFixed(0)}hrs → MTBF=<b style="color:var(--teal)">${mtbf.toFixed(0)} hrs</b> | ρ=${rho.toExponential(3)}/hr`;
}

function drawAMCharts() {
 const r = AM.res; if (!r) return;

 (()=>{
 const cv = document.getElementById('amCumChart'); if (!cv) return;
 cv.width = cv.offsetWidth || 700; const W = cv.width, H = 220;
 const x = cv.getContext('2d'); x.clearRect(0,0,W,H);
 const PAD = {l:50,r:16,t:14,b:32};
 const iW = W-PAD.l-PAD.r, iH = H-PAD.t-PAD.b;
 const maxT = r.T * 1.05;
 const maxN = r.lambda * Math.pow(maxT, r.beta) * 1.1;
 const tX = t => PAD.l + iW * t / maxT;
 const tY = n => PAD.t + iH * (1 - n / maxN);

 x.strokeStyle = 'rgba(15,23,42,0.08)'; x.lineWidth = .5;
 [0,.25,.5,.75,1].forEach(v => {
 const y = PAD.t + iH * (1-v);
 x.beginPath(); x.moveTo(PAD.l,y); x.lineTo(W-PAD.r,y); x.stroke();
 x.fillStyle='#64748b'; x.font='9px monospace'; x.textAlign='right';
 x.fillText(Math.round(maxN*v), PAD.l-3, y+3);
 });

 x.strokeStyle = '#0d9488'; x.lineWidth = 2; x.beginPath();
 for (let i=0; i<=100; i++) {
 const t = maxT * i / 100;
 const n = r.lambda * Math.pow(Math.max(t,0.1), r.beta);
 i===0 ? x.moveTo(tX(t), tY(n)) : x.lineTo(tX(t), tY(n));
 }
 x.stroke();

 x.strokeStyle = '#f59e0b'; x.lineWidth = 1.5; x.setLineDash([4,3]);
 x.beginPath();
 r.failures.forEach((t,i) => {
 i===0 ? x.moveTo(tX(t), tY(i+1)) : x.lineTo(tX(t), tY(i+1));
 x.lineTo(tX(i+1<r.failures.length?r.failures[i+1]:maxT), tY(i+1));
 });
 x.stroke(); x.setLineDash([]);

 x.fillStyle = '#f59e0b';
 r.failures.forEach((t,i) => {
 x.beginPath(); x.arc(tX(t), tY(i+1), 3.5, 0, Math.PI*2); x.fill();
 });

 x.fillStyle = '#64748b'; x.font = '9px monospace'; x.textAlign = 'center';
 [0,.25,.5,.75,1].forEach(v => x.fillText((maxT*v|0), tX(maxT*v), H-PAD.b+12));

 x.fillStyle = '#0d9488'; x.fillRect(PAD.l,8,14,2);
 x.fillStyle = '#94a3b8'; x.font = '9px sans-serif'; x.textAlign = 'left';
 x.fillText(LANG==='zh'?'Crow-AMSAA拟合':'AMSAA Fit', PAD.l+18, 13);
 x.strokeStyle = '#f59e0b'; x.setLineDash([4,3]); x.beginPath();
 x.moveTo(PAD.l+130,9); x.lineTo(PAD.l+144,9); x.stroke(); x.setLineDash([]);
 x.fillStyle = '#94a3b8'; x.fillText(LANG==='zh'?'实测数据':'Observed', PAD.l+148, 13);
 })();

 (()=>{
 const cv = document.getElementById('amMTBFChart'); if (!cv) return;
 cv.width = cv.offsetWidth || 700; const W = cv.width, H = 200;
 const x = cv.getContext('2d'); x.clearRect(0,0,W,H);
 const PAD = {l:56,r:16,t:14,b:32};
 const iW = W-PAD.l-PAD.r, iH = H-PAD.t-PAD.b;
 const maxT = r.T * 1.5;
 const pts = Array.from({length:101},(_,i)=>{
 const t = Math.max(r.failures[0]*0.5, maxT*i/100);
 const mtbf = Math.pow(t, 1-r.beta) / (r.lambda * r.beta);
 return {t, mtbf};
 });
 const maxM = Math.max(...pts.map(p=>p.mtbf)) * 1.1;
 const tX = t => PAD.l + iW * t / maxT;
 const tY = m => PAD.t + iH * (1 - m / maxM);

 x.strokeStyle = 'rgba(15,23,42,0.08)'; x.lineWidth = .5;
 [0,.25,.5,.75,1].forEach(v => {
 const y = PAD.t + iH * (1-v);
 x.beginPath(); x.moveTo(PAD.l,y); x.lineTo(W-PAD.r,y); x.stroke();
 x.fillStyle='#64748b'; x.font='9px monospace'; x.textAlign='right';
 x.fillText((maxM*v|0), PAD.l-3, y+3);
 });

 x.strokeStyle = 'rgba(245,158,11,.4)'; x.lineWidth = 1; x.setLineDash([4,3]);
 x.beginPath(); x.moveTo(tX(r.T),PAD.t); x.lineTo(tX(r.T),PAD.t+iH); x.stroke(); x.setLineDash([]);
 x.fillStyle = '#f59e0b'; x.font='8px sans-serif'; x.textAlign='center';
 x.fillText(LANG==='zh'?'当前':'Now', tX(r.T), PAD.t+8);

 x.strokeStyle = '#10b981'; x.lineWidth = 2.5; x.beginPath();
 pts.forEach((p,i) => i===0 ? x.moveTo(tX(p.t),tY(p.mtbf)) : x.lineTo(tX(p.t),tY(p.mtbf)));
 x.stroke();

 x.fillStyle = '#6366f1';
 for (let i=1; i<r.failures.length; i++) {
 const ifi = r.failures[i] - r.failures[i-1];
 const t = r.failures[i];
 if (ifi <= maxM && t <= maxT) {
 x.beginPath(); x.arc(tX(t), tY(ifi), 4, 0, Math.PI*2); x.fill();
 }
 }

 x.fillStyle = '#64748b'; x.font = '9px monospace'; x.textAlign = 'center';
 [0,.25,.5,.75,1].forEach(v => x.fillText((maxT*v|0)+'hr', tX(maxT*v), H-PAD.b+12));
 x.fillStyle = '#64748b'; x.textAlign = 'left';
 x.fillText(LANG==='zh'?'MTBF (hrs)':'MTBF (hrs)', PAD.l+4, PAD.t+11);
 })();
}
