function drawRAMCharts(){
const r=RAM.res;if(!r)return;
const z=LANG==='zh';
(()=>{const cv=document.getElementById('rmAnn');if(!cv||!r.annStats)return;
cv.width=cv.offsetWidth||720;const W=cv.width,H=220;
const x=cv.getContext('2d');x.clearRect(0,0,W,H);
const PAD={l:52,r:16,t:18,b:32};
const iW=W-PAD.l-PAD.r,iH=H-PAD.t-PAD.b;
const n=r.annStats.length;
const maxV=Math.max(...r.annStats.map(d=>d.p90))*1.12||0.01;
const bw=iW/n;
const tY=v=>PAD.t+iH*(1-v/maxV);
x.strokeStyle='rgba(15,23,42,0.08)';x.lineWidth=.5;
[0,.25,.5,.75,1].forEach(v=>{const y=PAD.t+iH*(1-v);
x.beginPath();x.moveTo(PAD.l,y);x.lineTo(W-PAD.r,y);x.stroke();
x.fillStyle='#64748b';x.font='9px monospace';x.textAlign='right';
x.fillText((maxV*v).toFixed(2),PAD.l-3,y+3);});
const designAnn=RAM.sysCap*8760/1e9;
if(designAnn<=maxV){x.strokeStyle='rgba(16,185,129,.4)';x.lineWidth=1;x.setLineDash([4,3]);
x.beginPath();x.moveTo(PAD.l,tY(designAnn));x.lineTo(W-PAD.r,tY(designAnn));x.stroke();x.setLineDash([]);
x.fillStyle='#34d399';x.font='8px sans-serif';x.textAlign='left';x.fillText(z?'满产':'Full cap',W-PAD.r+2,tY(designAnn)+3);}
r.annStats.forEach((d,i)=>{
const bx=PAD.l+i*bw+bw*.15;const bww=bw*.7;
const col=d.mean/designAnn>=.9?'#10b981':d.mean/designAnn>=.75?'#f59e0b':'#ef4444';
x.fillStyle='rgba(255,255,255,.06)';
x.fillRect(bx,tY(d.p90),bww,tY(d.p10)-tY(d.p90));
x.fillStyle=col+'cc';x.fillRect(bx,tY(d.mean),bww,iH-(tY(d.mean)-PAD.t));
if(i%5===0||i===n-1){x.fillStyle='#64748b';x.font='9px monospace';x.textAlign='center';
x.fillText('Y'+d.yr,bx+bww/2,H-PAD.b+12);}});
x.fillStyle='#10b981cc';x.fillRect(PAD.l,8,12,8);
x.fillStyle='rgba(255,255,255,.06)';x.fillRect(PAD.l+80,8,12,8);
x.fillStyle='#94a3b8';x.font='9px sans-serif';x.textAlign='left';
x.fillText(z?'年产量(B Nm³)':'Annual prod',PAD.l+16,15);
x.fillText('P10-P90',PAD.l+96,15);})();
(()=>{const cv=document.getElementById('rmTrace');if(!cv||!r.trace)return;
cv.width=cv.offsetWidth||720;const W=cv.width,H=180;
const x=cv.getContext('2d');x.clearRect(0,0,W,H);
const PAD={l:52,r:16,t:14,b:28};
const iW=W-PAD.l-PAD.r,iH=H-PAD.t-PAD.b;
const pts=r.trace;if(!pts.length)return;
const maxT=8760,maxC=RAM.sysCap;
const tX=t=>PAD.l+iW*(t/maxT);const tY=c=>PAD.t+iH*(1-c/maxC);
x.strokeStyle='rgba(15,23,42,0.08)';x.lineWidth=.5;
[0,.25,.5,.75,1].forEach(v=>{const y=PAD.t+iH*(1-v);
x.beginPath();x.moveTo(PAD.l,y);x.lineTo(W-PAD.r,y);x.stroke();
x.fillStyle='#64748b';x.font='9px monospace';x.textAlign='right';
x.fillText(v===0?'0':(maxC*v/1000).toFixed(0)+'k',PAD.l-3,y+3);});
x.fillStyle='rgba(13,148,136,.2)';x.beginPath();
x.moveTo(tX(0),PAD.t+iH);
pts.forEach(p=>x.lineTo(tX(p.t),tY(p.c)));
x.lineTo(tX(pts[pts.length-1].t),PAD.t+iH);x.closePath();x.fill();
x.strokeStyle='#0d9488';x.lineWidth=1.5;x.beginPath();
pts.forEach((p,i)=>{i===0?x.moveTo(tX(p.t),tY(p.c)):x.lineTo(tX(p.t),tY(p.c));});
x.stroke();
const mths=z?['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月']:
['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
x.fillStyle='#64748b';x.font='8px sans-serif';x.textAlign='center';
mths.forEach((_,i)=>{if(i%2===0)x.fillText(mths[i],tX((i+.5)*730),H-PAD.b+12);});
x.fillStyle='#0d9488';x.font='9px sans-serif';x.textAlign='left';
x.fillText(z?'合成气产能 Nm³/h':'Syngas Nm³/h',PAD.l+4,PAD.t+11);})();
(()=>{const cv=document.getElementById('rmTornado');if(!cv||!r.sens)return;
cv.width=cv.offsetWidth||720;
cv.height=Math.max(80,r.sens.length*48);
const W=cv.width,H=cv.height;
const x=cv.getContext('2d');x.clearRect(0,0,W,H);
const n=r.sens.length;const rowH=H/n;
const maxDelta=Math.max(...r.sens.map(s=>Math.abs(s.delta)));
const midX=W/2;const scale=(W/2-60)/Math.max(maxDelta,.001);
r.sens.forEach((s,i)=>{
const y=i*rowH;const barW=Math.abs(s.delta)*scale;
const col=s.delta<0?'#ef4444':'#10b981';
if(s.delta<0)x.fillStyle=col+'cc',x.fillRect(midX-barW,y+rowH*.2,barW,rowH*.6);
else x.fillStyle=col+'cc',x.fillRect(midX,y+rowH*.2,barW,rowH*.6);
x.fillStyle='#f1f5f9';x.font='11px sans-serif';x.textAlign='center';
x.fillText(s.label,midX,y+rowH*.6);
x.fillStyle=col;x.font='10px monospace';
if(s.delta<0){x.textAlign='right';x.fillText(s.pct.toFixed(1)+'%',midX-barW-4,y+rowH*.6);}
else{x.textAlign='left';x.fillText('+'+s.pct.toFixed(1)+'%',midX+barW+4,y+rowH*.6);}});
x.strokeStyle='rgba(255,255,255,.2)';x.lineWidth=1;
x.beginPath();x.moveTo(midX,0);x.lineTo(midX,H);x.stroke();
x.fillStyle='#64748b';x.font='9px sans-serif';x.textAlign='center';
x.fillText(z?'← 产量减少':'← Less production',midX-80,H-4);
x.fillText(z?'产量增加 →':'More production →',midX+80,H-4);})();
(()=>{const cv=document.getElementById('rmConv');if(!cv||!r.conv.length)return;
cv.width=cv.offsetWidth||720;const W=cv.width,H=160;
const x=cv.getContext('2d');x.clearRect(0,0,W,H);
const PAD={l:52,r:16,t:14,b:28};
const iW=W-PAD.l-PAD.r,iH=H-PAD.t-PAD.b;
const ys=r.conv.map(d=>d.avg);
const minY=Math.max(0,Math.min(...ys)*.95),maxY=Math.max(...ys)*1.05;
const maxX=r.conv[r.conv.length-1].run;
const tX=v=>PAD.l+iW*v/maxX;const tY=v=>PAD.t+iH*(1-(v-minY)/(maxY-minY));
x.strokeStyle='rgba(15,23,42,0.08)';x.lineWidth=.5;
[0,.25,.5,.75,1].forEach(v=>{const y=PAD.t+iH*(1-v);
x.beginPath();x.moveTo(PAD.l,y);x.lineTo(W-PAD.r,y);x.stroke();
x.fillStyle='#64748b';x.font='9px monospace';x.textAlign='right';
x.fillText((minY+(maxY-minY)*v).toFixed(3),PAD.l-3,y+3);});
x.strokeStyle='#0d9488';x.lineWidth=2;x.beginPath();
r.conv.forEach((d,i)=>{i===0?x.moveTo(tX(d.run),tY(d.avg)):x.lineTo(tX(d.run),tY(d.avg));});
x.stroke();
x.fillStyle='#64748b';x.font='9px monospace';x.textAlign='center';
[100,500,1000,2000,5000].filter(v=>v<=maxX).forEach(v=>x.fillText(v,tX(v),H-PAD.b+12));
x.fillStyle='#0d9488';x.font='9px sans-serif';x.textAlign='left';
x.fillText(z?'年均产量 B Nm³':'Annual avg B Nm³',PAD.l+4,PAD.t+11);})();}
function exportRAMCSV(){if(!RAM.res)return;const r=RAM.res;
const lines=['ReliToolbox RAM Results',`Runs,${r.n}`,`Mission,${RAM.yrs} years`,
`Design Syngas Capacity,${RAM.sysCap} Nm3/h`,'',
'KPI,Value,Unit',
`Annual Avg Production,${r.annualAvg.toFixed(4)},B Nm3/yr`,
`Total 20yr Production,${r.avgTP.toFixed(3)},B Nm3`,
`P10 Annual,${(r.p10/RAM.yrs).toFixed(4)},B Nm3/yr`,
`P50 Annual,${(r.p50/RAM.yrs).toFixed(4)},B Nm3/yr`,
`P90 Annual,${(r.p90/RAM.yrs).toFixed(4)},B Nm3/yr`,
`Capacity Factor,${(r.annualAvg/(RAM.sysCap*8760/1e9)*100).toFixed(1)},%`,
'','Year,Mean(B Nm3),P10,P50,P90',
...(r.annStats||[]).map(d=>`${d.yr},${d.mean.toFixed(4)},${d.p10.toFixed(4)},${d.p50.toFixed(4)},${d.p90.toFixed(4)}`)];
dl(lines.join('\n'),'RAM_Results.csv');}</script>
