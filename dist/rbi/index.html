function calcRBI(){
const z=LANG==='zh';
const res=RBI.equips.map(eq=>{
const ca=eq.wt-eq.mt,rl=eq.cr>0?ca/eq.cr:999,ys=2025-eq.li;
let pof=1;
if(rl<2)pof=5;else if(rl<5)pof=4;else if(rl<10)pof=3;else if(rl<20)pof=2;
if(ys>rl*.5)pof=Math.min(5,pof+1);
const mechMod={uniform:0,pitting:1,scc:2,htha:2,cui:1}[eq.corrMech||'uniform']||0;
pof=Math.min(5,pof+mechMod);
const haz=eq.med==='toxic'?3:eq.med==='flammable'?2:1;
let cof=Math.min(5,Math.ceil(haz*Math.sqrt(eq.vol)/2));
if(eq.oP>eq.dP*.9)cof=Math.min(5,cof+1);if(eq.oT>eq.dT*.9)cof=Math.min(5,cof+1);
const risk=pof*cof,lv=risk>=15?'High':risk>=8?'M-High':risk>=4?'Medium':'Low';
const col=risk>=15?'#ef4444':risk>=8?'#f97316':risk>=4?'#f59e0b':'#10b981';
const intv=risk>=15?1:risk>=8?3:risk>=4?5:10;
return{...eq,ca:ca.toFixed(1),rl:rl.toFixed(1),pof,cof,risk,lv,col,intv,next:eq.li+intv};});

</td>`;}).join('')}</tr>`).join('')}</tbody></table></div></div>`;

<td style="color:${r.rl<5?'#ef4444':r.rl<10?'#f59e0b':'var(--text)'};font-family:monospace">${r.rl} yrs</td>
<td style="font-family:monospace">${r.intv} yrs</td>
<td style="font-weight:700;font-family:monospace">${r.next}</td>
</tr>`).join('')}</tbody>
</table></div></div>`;
document.getElementById('rbiRes').innerHTML=mtx+tbl;
 // Save to DB (non-blocking)
 saveRBItoDB(res).catch(()=>{});
}
async function saveRBItoDB(results){
 if(typeof ReliDB === 'undefined') return;
 const now = Date.now();
 for(const r of results){
   // Try to find matching equipment by tag
   const eqs = await ReliDB.all('equipments');
   const eq = eqs.find(e => e.tag && e.tag.trim() === r.tag.trim());
   // Save RBI assessment record
   await ReliDB.put('rbi_assessments',{
     id: 'rbi_' + r.tag + '_' + now,
     equipId: eq ? eq.id : null,
     tag: r.tag,
     pof: r.pof, cof: r.cof, risk: r.risk,
     riskLevel: r.lv, remainLife: parseFloat(r.rl),
     interval: r.intv, nextInsp: r.next,
     assessedAt: now,
   });
   // Back-write risk level to equipment record
   if(eq){
     const riskCode = r.risk>=15?'H': r.risk>=8?'M': r.risk>=4?'L':'L';
     await ReliDB.put('equipments', {...eq, risk: riskCode, nextinsp: r.next, updatedAt: now});
   }
 }
}</script>
